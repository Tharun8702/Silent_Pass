name: Build Silent_Pass

on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ libnss3-dev libsecret-1-dev libssl-dev pkg-config sqlite3 libsqlite3-dev zlib1g-dev libxml2-dev

      - name: Configure and Build
        run: |
          mkdir build
          cd build
          cmake ..
          make

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: silent-pass-linux
          path: build/Silent_Pass

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install MinGW Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake mingw-w64

      - name: Cross-Compile for Windows
        run: |
          mkdir build
          cd build
          # Using the toolchain file provided in the repo
          cmake -DCMAKE_TOOLCHAIN_FILE=../platforms/linux/mingw32.toolchain.cmake ..
          make

      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: silent-pass-windows
          path: build/Silent_Pass.exe
