name: Build Silent_Pass

on: [push, pull_request]

jobs:
  build-windows:
    name: Build for Windows (Cross-Compile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install MinGW Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake mingw-w64

      - name: Download and Setup Windows OpenSSL
        run: |
          # Create a directory for dependencies
          mkdir -p $GITHUB_WORKSPACE/deps
          cd $GITHUB_WORKSPACE/deps
          
          # Download pre-built OpenSSL for MinGW (i686 for 32-bit)
          # We use a common community build for MinGW cross-compiling
          wget https://github.com
          unzip openssl-3.1.2-win32-mingw.zip -d openssl_win
          
          # Set environment variable for CMake to find it
          echo "OPENSSL_ROOT_DIR=$GITHUB_WORKSPACE/deps/openssl_win" >> $GITHUB_ENV

      - name: Cross-Compile for Windows
        run: |
          mkdir build
          cd build
          # Pass the OpenSSL path to CMake so it finds the headers
          cmake -DCMAKE_TOOLCHAIN_FILE=../platforms/linux/mingw32.toolchain.cmake \
                -DOPENSSL_ROOT_DIR=${{ env.OPENSSL_ROOT_DIR }} \
                -DOPENSSL_INCLUDE_DIR=${{ env.OPENSSL_ROOT_DIR }}/include \
                ..
          make

      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: silent-pass-windows
          path: build/Silent_Pass.exe
